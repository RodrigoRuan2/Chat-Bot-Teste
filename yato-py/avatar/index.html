<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yato — Avatar</title>
  <link rel="stylesheet" href="estilo.css">

  <!-- As 3 bibliotecas do Live2D, agora LOCAIS (o avatar funciona offline):
       1) live2dcubismcore.min.js — runtime OFICIAL da Live2D (Cubism 4). É
          PROPRIETÁRIO: não vai pro Git; o preparar.py baixa (User-Agent);
       2) lib/pixi.min.js — PIXI.js 6.5.2, o motor de desenho 2D (a v6 é a que
          o renderizador exige; v7+ tem outra API e quebra). MIT, vai no repo;
       3) lib/cubism4.min.js — pixi-live2d-display 0.4.0, a cola Live2D↔PIXI.
          MIT, vai no repo. VERSÃO PINADA: o "latest" servia um bundle sem a
          classe Live2DModel. A 0.4.0 funciona — não troque sem testar. -->
  <script src="live2dcubismcore.min.js"></script>
  <script src="lib/pixi.min.js"></script>
  <script src="lib/cubism4.min.js"></script>
</head>
<body>
  <!-- O "palco" onde o personagem é desenhado. (Fechar = tecla ESC, tratada
       direto no Electron — sem botão na tela.) -->
  <canvas id="palco"></canvas>

  <!-- Camada transparente por cima do canvas: é ela que arrasta a janela
       (no Electron). Fica ABAIXO do botão ✕ no z-index, pra ele furar. -->
  <div id="arraste"></div>

  <!-- Nossa lógica: carregar e controlar o avatar -->
  <script src="avatar.js"></script>
</body>
</html>
